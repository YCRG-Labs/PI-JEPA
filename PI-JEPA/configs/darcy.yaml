experiment:
  name: pi_jepa_darcy_full_v1
  seed: 42
  device: cuda
  precision: fp16          # fast + stable enough for this setup
  deterministic: false

# -------------------------
# DATA (u_t, u_{t+Δt})
# -------------------------
data:
  dataset: darcy
  path: ./data/darcy/
  grid_size: 64
  dt: 1.0

  channels:
    pressure: 0
    saturation: 1
    logK: 2

  temporal:
    delta_t: 1
    multi_step_pairs: false   # keep simple, rollout handles long horizon

  patch:
    size: 8
    stride: 8
    flatten: true
    embed_dim: 384
    positional_encoding: sincos2d

  normalization:
    type: standard
    per_channel: true
    eps: 1e-6

  loader:
    batch_size: 16
    num_workers: 4
    shuffle: true
    pin_memory: true
    drop_last: true
    prefetch_factor: 2
    
# MODEL (PI-JEPA core)
model:
  latent_dim: 384
  num_patches: 64

  encoder:
    type: vit
    depth: 8
    heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    attention_dropout: 0.1
    layer_norm: true
    pre_norm: true
    residual_scale: 1.0

  predictor:
    type: transformer
    sequential: true         # enforces operator order
    shared_weights: false    # each stage learns its own physics

    stages:
      - name: pressure_step
        depth: 4
        heads: 6
        hidden_dim: 384
        residual: true
        layer_norm: true

      - name: transport_step
        depth: 4
        heads: 6
        hidden_dim: 384
        residual: true
        layer_norm: true

    skip_connections: true   # helps stability across stages

  decoder:
    type: cnn
    shared_backbone: false   # keep heads independent (physics clarity)

    heads:
      pressure:
        channels: [128, 64, 32]
        activation: gelu
        output: scalar

      saturation:
        channels: [128, 64, 32]
        activation: gelu
        output: scalar

# JEPA mechanics (important)
ema:
  enabled: true
  schedule:
    type: cosine
    tau_start: 0.99
    tau_end: 0.9995
    warmup_epochs: 10

masking:
  strategy: hybrid
  context_ratio: 0.65

  # spatial masking block = harder prediction task (good)
  spatial_block:
    enabled: true
    min_block: 4
    max_block: 16

  # leave temporal masking off initially (can destabilize early)
  temporal_shift:
    enabled: false

# TRAINING LOOP
training:
  epochs: 150

  optimizer: adamw
  optim:
    lr: 1e-4
    weight_decay: 1e-5
    betas: [0.9, 0.95]

  scheduler:
    type: cosine
    warmup_epochs: 10
    min_lr: 1e-6

  gradient:
    clip_norm: 1.0
    accumulate_steps: 1

  stability:
    nan_check: true
    anomaly_detection: false

  # rollout consistency improves long-horizon behavior
  rollout_training:
    enabled: true
    steps: [1, 2, 3]
    detach_between_steps: true
    weight_decay_per_step: 0.9

# OBJECTIVE 
loss:
  total:
    combine: weighted_sum

  # L_pred = || ẑ_{t+1} - z_{t+1} ||^2
  prediction:
    type: mse
    weight: 1.0
    normalize: true

  # stage-wise latent supervision (very important for splitting)
  stagewise_prediction:
    enabled: true
    weights:
      pressure_step: 1.0
      transport_step: 1.0

  # L_phys = || R(û) ||^2
  physics:
    enabled: true
    weight: 0.1
    normalize: true

    stages:
      pressure_step:
        equation: divergence_form
        weight: 1.0

      transport_step:
        equation: conservation_law
        weight: 1.0

    residual_scaling:
      pressure: 1.0
      saturation: 1.0

  # keep latent space as stable as possible(prevents collapse)
  regularization:
    variance:
      weight: 0.05
      gamma: 1.0

    covariance:
      weight: 0.01

    invariance:
      weight: 0.0

# PHYSICS DEFINITIONS
physics:
  parameters:
    viscosity: 1.0
    permeability: logK

  pressure:
    form: elliptic
    operator: div(K grad p)
    source: q

  transport:
    form: hyperbolic
    flux: fractional_flow
    velocity_from_pressure: true

  numerical:
    method: finite_difference
    stencil: 2
    boundary: neumann
    epsilon: 1e-6

    gradient:
      scheme: central

    divergence:
      scheme: central

# EVALUATION
evaluation:
  rollout:
    steps: [10, 20, 50, 100]
    measure_error_growth: true

  metrics:
    field:
      - mse
      - mae
      - relative_l2

    rollout:
      - error_growth
      - stability_index

    physics:
      - residual_mean
      - residual_max

  visualization:
    save_predictions: true
    save_error_maps: true
    save_rollout_sequences: true

logging:
  frequency:
    step: 10
    epoch: 1

  outputs:
    base_dir: ./outputs/

    checkpoints:
      save_best: true
      save_last: true

    logs:
      format: json

    plots: true
    rollouts: true

#debugging patch in case
debug:
  overfit_small_batch: false
  log_shapes: false
  disable_physics: false
