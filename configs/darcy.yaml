# =============================================================================
# PI-JEPA Configuration for Darcy Flow
# =============================================================================
# Paper specifications:
# - 500 epochs pretraining with batch size 64
# - AdamW: lr=1.5×10^-4, weight_decay=5×10^-2
# - EMA momentum annealing: τ from 0.99 to 0.999 over first 10% epochs
# - Physics weight ramping over first 200 steps
# - Loss weights: λ_p=0.1 (physics), λ_r=1.0 (regularization)
# =============================================================================

# -----------------------------------------------------------------------------
# Problem Configuration
# -----------------------------------------------------------------------------
problem:
  type: steady_state  # steady_state (Darcy) or time_dependent (Navier-Stokes, reactive transport)

# -----------------------------------------------------------------------------
# Experiment Configuration
# -----------------------------------------------------------------------------
experiment:
  name: pi_jepa_darcy_paper
  seed: 42
  device: null  # null for auto-detect (cuda > mps > cpu)
  precision: fp32  # fp32 or fp16
  deterministic: false

# -----------------------------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------------------------
data:
  dataset: ufno_co2  # ufno_co2, pdebench_adr, spe10, navier_stokes
  path: ""  # Empty string to use neuralop auto-download, or specify local path
  grid_size: 64  # 64x64 resolution for proper masking (8x8 grid of patches)
  sequence_length: 2
  stride: 1
  normalize: true
  include_coeff: true
  num_patches: 64  # (grid_size / patch_size)^2 = (64/8)^2 = 64
  
  channels:
    u: 0  # Solution field channel
    k: 1  # Coefficient field channel
  
  splits:
    train: 1600
    pretrain: 200
    finetune: 200
    test: 200

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
model:
  latent_dim: 384
  num_predictors: 2  # K=2 for Darcy, K=3 for reactive transport
  
  encoder:
    embed_dim: 384
    patch_size: 8
    image_size: 64  # Match data grid_size
    depth: 8
    heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    attention_dropout: 0.1
    drop_path: 0.1
    residual_scale: 1.0
    in_channels: 2  # 1 for pretraining (coefficient only), 2 for legacy (solution + coefficient)
  
  predictor:
    stages:
      - name: pressure_step
        depth: 4
        heads: 6
        hidden_dim: 384
      
      - name: transport_step
        depth: 4
        heads: 6
        hidden_dim: 384
    
    drop_path: 0.1
    sequential: true
    skip_connections: true
    channel_mixing: false  # Enable for multi-species (K=3)
    n_species: 1  # Number of species for reactive transport

# -----------------------------------------------------------------------------
# Decoder Configuration
# -----------------------------------------------------------------------------
decoder:
  embed_dim: 384
  out_channels: 2
  image_size: 64  # Match data grid_size
  patch_size: 8

# -----------------------------------------------------------------------------
# Physics Configuration
# -----------------------------------------------------------------------------
physics:
  type: darcy  # darcy or reactive_transport
  
  # Darcy-specific (Brooks-Corey model)
  brooks_corey:
    S_wr: 0.0  # Residual water saturation
    S_nr: 0.0  # Residual non-wetting saturation
    lambda: 2.0  # Pore size distribution index
  
  mu_w: 1.0  # Water viscosity
  mu_n: 5.0  # Non-wetting phase viscosity
  collocation_size: 32  # 32×32 = 1024 collocation points
  dx: 1.0
  dy: 1.0
  dt: 1.0
  
  # Reactive transport-specific (K=3)
  n_species: 1
  stoichiometry: []  # Flattened stoichiometric matrix
  peclet: 1.0  # Péclet number
  damkohler: 1.0  # Damköhler number

# -----------------------------------------------------------------------------
# Training Configuration (Paper Specifications)
# -----------------------------------------------------------------------------
training:
  epochs: 500  # Paper: 500 epochs pretraining
  batch_size: 64
  
  optim:
    lr: 1.5e-4  # Paper: 1.5×10^-4
    weight_decay: 5e-2  # Paper: 5×10^-2
    betas: [0.9, 0.95]
  
  gradient:
    clip_norm: 1.0
  
  rollout_training:
    enabled: true
    weight_decay_per_step: 0.9

# -----------------------------------------------------------------------------
# Loss Configuration (Paper Specifications)
# -----------------------------------------------------------------------------
loss:
  prediction:
    weight: 1.0
    normalize: true
  
  stagewise_prediction:
    enabled: true
    weights:
      pressure_step: 1.0
      transport_step: 1.0
  
  physics:
    enabled: true
    weight: 0.1  # Paper: λ_p = 0.1
    ramp_steps: 200  # Paper: ramp over first 200 steps
    
    # Separate weights for K=3 predictors (reactive transport)
    weights_per_residual:
      pressure: 0.1  # λ_p^(1)
      transport: 0.1  # λ_p^(2)
      reaction: 0.1  # λ_p^(3)
    
    # Physics loss parameters
    mu_w: 1.0
    mu_o: 5.0
    krw_exp: 2.0
    kro_exp: 2.0
  
  regularization:
    weight: 1.0  # Paper: λ_r = 1.0
    
    variance:
      weight: 0.05
      gamma: 1.0
    
    covariance:
      weight: 0.01

# -----------------------------------------------------------------------------
# EMA Configuration (Paper Specifications)
# -----------------------------------------------------------------------------
ema:
  enabled: true
  schedule:
    tau_start: 0.99  # Paper: τ starts at 0.99
    tau_end: 0.999  # Paper: τ ends at 0.999
    warmup_fraction: 0.1  # Paper: over first 10% of epochs

# -----------------------------------------------------------------------------
# Masking Configuration
# -----------------------------------------------------------------------------
masking:
  context_ratio: 0.65

# -----------------------------------------------------------------------------
# Pretraining Configuration (Self-Supervised)
# -----------------------------------------------------------------------------
# Self-supervised pretraining on unlabeled coefficient fields only.
# Uses JEPA objective with spatial block masking.
pretraining:
  enabled: true
  epochs: 500  # Paper: 500 epochs pretraining
  batch_size: 64
  
  # Unlabeled data settings
  n_unlabeled: 1000  # N_u: number of unlabeled coefficient fields
  
  # JEPA objective settings
  jepa:
    normalize_embeddings: true
    stop_gradient_target: true
  
  # Masking settings (spatial block masking)
  # For 16x16 images with 8x8 patches: 2x2 grid (4 patches)
  # For 32x32 images with 8x8 patches: 4x4 grid (16 patches)
  # For 64x64 images with 8x8 patches: 8x8 grid (64 patches)
  masking:
    context_ratio: 0.65  # ~65% context patches
    min_block_size: 1  # Minimum target block size in patches
    max_block_size: 4  # Maximum target block size in patches (for 8x8 grid)
  
  # Physics residual (optional during pretraining)
  physics:
    enabled: true  # Flag to enable/disable physics residual during pretraining
    weight: 0.1  # Paper: λ_p = 0.1
    ramp_steps: 200  # Paper: ramp over first 200 steps
  
  # VICReg regularization to prevent embedding collapse
  vicreg:
    variance_weight: 0.05
    covariance_weight: 0.01
  
  # Optimizer settings
  optim:
    lr: 1.5e-4  # Paper: 1.5×10^-4
    weight_decay: 5e-2  # Paper: 5×10^-2
    betas: [0.9, 0.95]
  
  # EMA schedule for target encoder
  ema:
    tau_start: 0.99  # Paper: τ starts at 0.99
    tau_end: 0.999  # Paper: τ ends at 0.999
    warmup_fraction: 0.1  # Paper: over first 10% of epochs
  
  # Checkpointing
  checkpoint:
    save_interval: 50  # Save every N epochs
    save_best: true  # Save best model based on loss

# -----------------------------------------------------------------------------
# Finetuning Configuration (Supervised)
# -----------------------------------------------------------------------------
# Supervised finetuning with frozen encoder and trainable prediction head.
# Uses limited labeled (x, y) pairs for data efficiency evaluation.
finetuning:
  enabled: true
  epochs: 100  # Paper: 100 epochs fine-tuning
  batch_size: 32
  
  # Labeled data settings
  n_labeled: 100  # N_l: number of labeled (x, y) pairs
  n_labeled_sweep: [10, 25, 50, 100, 250, 500]  # For data efficiency evaluation
  
  # Encoder freezing
  freeze_encoder: true  # Freeze encoder during finetuning
  
  # Prediction head settings
  prediction_head:
    hidden_dim: 512
    output_channels: 1
  
  # Optimizer (only for prediction head when encoder frozen)
  optim:
    lr: 1e-3  # Higher LR for prediction head
    weight_decay: 1e-4
  
  # Full finetuning option (unfreeze encoder)
  full_finetune:
    enabled: false  # Set to true to unfreeze encoder
    encoder_lr_multiplier: 0.1  # Lower LR for encoder if unfrozen
  
  # Checkpointing
  checkpoint:
    save_interval: 20  # Save every N epochs
    save_best: true  # Save best model based on validation loss

# -----------------------------------------------------------------------------
# Legacy Fine-Tuning Configuration (Deprecated)
# -----------------------------------------------------------------------------
# Kept for backward compatibility. Use 'finetuning' section above instead.
finetune:
  epochs: 100  # Paper: 100 epochs fine-tuning
  lr: 1.5e-4  # Paper: same learning rate
  n_labeled: [10, 25, 50, 100, 250, 500]  # Data efficiency sweep
  freeze_encoder: true

# -----------------------------------------------------------------------------
# Rollout Configuration
# -----------------------------------------------------------------------------
rollout:
  horizons: [1, 5, 10, 20, 40]  # Paper: evaluation horizons
  noise:
    enabled: true
    sigma_start: 1e-2  # Paper: σ starts at 10^-2
    sigma_end: 1e-4  # Paper: σ ends at 10^-4
    schedule: linear  # linear or cosine

# -----------------------------------------------------------------------------
# Evaluation Configuration
# -----------------------------------------------------------------------------
evaluation:
  metrics:
    - relative_l2
    - pde_residual
    - per_channel_mse
    - ood_error
  ood_split: spe10
  
  # Data efficiency evaluation settings
  data_efficiency:
    enabled: true
    n_labeled_sweep: [10, 25, 50, 100, 250, 500]  # Labeled sample counts to evaluate
    baselines: [fno, geo_fno, deeponet]  # Baseline models to compare against
    test_set_size: 200  # Number of test samples
    output_file: benchmark_comparison.json  # Output file for results

# -----------------------------------------------------------------------------
# Visualization Configuration
# -----------------------------------------------------------------------------
visualization:
  enabled: true
  output_dir: ./outputs/figures
  plots:
    - rollout_comparison
    - data_efficiency
    - error_accumulation
    - latent_space

# -----------------------------------------------------------------------------
# Ablation Configuration
# -----------------------------------------------------------------------------
ablation:
  enabled: false
  vary_k: [1, 2, 3]  # Number of predictors
  disable_components:
    - physics
    - variance
    - covariance

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
logging:
  base_dir: ./outputs
  log_interval: 50
  save_interval: 10  # Save checkpoint every N epochs
