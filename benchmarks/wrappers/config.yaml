# =========================
# General settings
# =========================
experiment_name: pi_jepa_benchmark
seed: 42
device: cuda   # set to "cpu" if no GPU

# =========================
# Dataset settings
# =========================
dataset:
  name: darcy
  train_samples: [10, 25, 50, 100]
  test_samples: 20
  batch_size: 8
  num_workers: 2   # safer for speed (set 0 if issues)

# =========================
# Training settings
# =========================
training:
  epochs: 50
  learning_rate: 0.001

# =========================
# Models to benchmark
# =========================
models:
  - pi_jepa
  - unet
  - fno
  - geo_fno
  - pino
  - deeponet
  - pinn
  - pi_latent_no

# =========================
# Output
# =========================
output:
  results_file: benchmarks/results.csv
  save_every_run: true   # ensures incremental saving

# =========================
# Debug / fast testing mode
# =========================
debug:
  enabled: false
  small_run_samples: [10]
  epochs: 2