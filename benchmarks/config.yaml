experiment_name: pi_jepa_benchmark
seed: 42
device: cuda

data:
  path: data        # <-- IMPORTANT: folder with train.npz / test.npz
  normalize: false

dataset:
  batch_size: 8

training:
  epochs: 50
  learning_rate: 0.001

models:
  - fno
  - geo_fno
  - pino
  - deeponet
  - pinn
  - pi_latent_no

output:
  results_file: benchmarks/results.csv